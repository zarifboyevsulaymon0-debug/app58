<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
    }

    body{
        background:#0f172a;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        width:400px;
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#0f172a;
    }

    .input-box{
        display:flex;
        gap:10px;
    }

    input{
        flex:1;
        padding:12px;
        border:2px solid #ddd;
        border-radius:10px;
        outline:none;
    }

    button{
        padding:12px 18px;
        border:none;
        background:#2563eb;
        color:white;
        border-radius:10px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#1d4ed8;
    }

    ul{
        list-style:none;
        margin-top:20px;
    }

    li{
        background:#f1f5f9;
        padding:12px;
        margin-top:10px;
        border-radius:10px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .delete{
        background:red;
        padding:6px 10px;
        border-radius:6px;
        color:white;
        cursor:pointer;
    }

    .completed{
        text-decoration:line-through;
        opacity:0.6;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Smart Todo App</h1>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    function addTask(){
        let input = document.getElementById("taskInput");
        let taskText = input.value.trim();

        if(taskText === ""){
            alert("Write something!");
            return;
        }

        let li = document.createElement("li");

        li.innerHTML = `
            <span onclick="toggleTask(this)">
                ${taskText}
            </span>

            <span class="delete" onclick="deleteTask(this)">
                X
            </span>
        `;

        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }

    function deleteTask(element){
        element.parentElement.remove();
    }

    function toggleTask(element){
        element.classList.toggle("completed");
    }
</script>

</body>
</html>
